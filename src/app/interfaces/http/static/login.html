<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Squid管理系统 - 登录</title>
  <style>
    :root {
      --primary: #165dff;
      --primary-dark: #0f46cc;
      --ink: #1e293b;
      --muted: #64748b;
      --line: #dbe4f0;
      --panel: rgba(255, 255, 255, 0.96);
      --danger: #dc2626;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      color: var(--ink);
      font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
      background-color: #f0f4fd;
      background-image: url("/static/login-bg.png");
      background-position: center center;
      background-repeat: no-repeat;
      background-size: cover;
      overflow-x: hidden;
    }

    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 24px 32px 18px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      width: max-content;
      color: #172033;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), #3a7dff);
      box-shadow: 0 10px 24px rgba(22, 93, 255, 0.25);
      font-size: 20px;
      font-weight: 800;
    }

    .shell {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 58px;
      width: min(1260px, 100%);
      margin: 0 auto;
      padding: 38px 0 28px;
      transform: translateY(clamp(-72px, -7vh, -38px));
    }

    .hero {
      flex: 1 1 56%;
      min-width: 0;
      padding-right: 12px;
      transform: translateY(-116px);
    }

    .hero h1 {
      margin: 0 0 14px;
      color: #1b273c;
      font-size: clamp(36px, 4.8vw, 56px);
      line-height: 1.12;
      letter-spacing: 0.04em;
    }

    .hero-subtitle {
      margin: 0 0 42px;
      color: var(--muted);
      font-size: 20px;
      letter-spacing: 0.08em;
    }

    .feature-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 28px;
      margin-bottom: 30px;
    }

    .feature {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      min-width: 0;
    }

    .feature-icon {
      display: grid;
      place-items: center;
      flex: 0 0 36px;
      width: 36px;
      height: 36px;
      border-radius: 12px;
      color: var(--primary);
      background: rgba(22, 93, 255, 0.09);
    }

    .feature h2 {
      margin: 0 0 5px;
      font-size: 15px;
    }

    .feature p {
      margin: 0;
      color: #8794a7;
      font-size: 13px;
      white-space: nowrap;
    }

    .login-side {
      flex: 0 0 420px;
      display: flex;
      justify-content: center;
    }

    .login-card {
      width: 100%;
      padding: 38px 40px 34px;
      border: 1px solid rgba(219, 228, 240, 0.92);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 28px 64px rgba(30, 74, 134, 0.12), 0 2px 8px rgba(15, 23, 42, 0.03);
      backdrop-filter: blur(14px);
    }

    .card-badge {
      position: relative;
      display: grid;
      place-items: center;
      width: 68px;
      height: 68px;
      margin: 0 auto 16px;
      border-radius: 50%;
      color: var(--primary);
      background: #eef5ff;
      box-shadow: inset 0 0 0 1px rgba(22, 93, 255, 0.08);
    }

    .card-badge::before,
    .card-badge::after {
      content: "";
      position: absolute;
      right: -18px;
      width: 28px;
      height: 2px;
      border-radius: 999px;
      background: #cfe0ff;
    }

    .card-badge::before {
      top: 28px;
    }

    .card-badge::after {
      top: 38px;
      right: -10px;
      width: 20px;
    }

    .login-card h2 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 24px;
      letter-spacing: 0.04em;
    }

    .login-card .hint {
      margin: 0 0 28px;
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
    }

    .form {
      display: grid;
      gap: 18px;
    }

    .field {
      position: relative;
    }

    .field > svg {
      position: absolute;
      left: 13px;
      top: 50%;
      width: 18px;
      height: 18px;
      color: #b5c0d2;
      transform: translateY(-50%);
    }

    .field input {
      width: 100%;
      height: 44px;
      padding: 0 14px 0 42px;
      border: 1px solid var(--line);
      border-radius: 9px;
      outline: none;
      color: #273449;
      background: #fff;
      font: inherit;
      font-size: 14px;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .field input::placeholder {
      color: #a8b3c4;
    }

    .field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(22, 93, 255, 0.12);
    }

    .field input:disabled {
      color: #93a0b4;
      background: #f8fafc;
      cursor: not-allowed;
    }

    .password-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      padding: 0;
      border: 0;
      color: #a8b3c4;
      background: transparent;
      cursor: pointer;
      transform: translateY(-50%);
      transition: color 0.18s ease;
    }

    .password-toggle:hover,
    .password-toggle.active {
      color: var(--primary);
    }

    .password-toggle svg {
      position: static;
      width: 18px;
      height: 18px;
      transform: none;
    }

    .password-field input {
      padding-right: 46px;
    }

    .captcha-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 132px;
      gap: 12px;
      align-items: start;
    }

    .captcha-panel {
      display: grid;
      gap: 6px;
    }

    .captcha-image-button {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 44px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 9px;
      background-color: #f6f7fb;
      cursor: pointer;
      overflow: hidden;
      user-select: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .captcha-image-button:hover,
    .captcha-image-button:focus-visible {
      border-color: rgba(22, 93, 255, 0.55);
      box-shadow: 0 0 0 3px rgba(22, 93, 255, 0.12);
      outline: none;
    }

    .captcha-image {
      display: block;
      width: 132px;
      height: 44px;
    }

    .captcha-note {
      color: #9aa6b7;
      font-size: 12px;
      text-align: right;
    }

    .remember-row {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: max-content;
      margin-top: -4px;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }

    .remember-row input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .error-message {
      display: none;
      padding: 11px 13px;
      border: 1px solid #fecaca;
      border-radius: 9px;
      color: var(--danger);
      background: #fef2f2;
      font-size: 13px;
      line-height: 1.5;
    }

    .error-message.show {
      display: block;
    }

    .login-button {
      width: 100%;
      height: 44px;
      border: 0;
      border-radius: 9px;
      color: #fff;
      background: var(--primary);
      box-shadow: 0 12px 24px rgba(22, 93, 255, 0.24);
      cursor: pointer;
      font: inherit;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.08em;
      transition: background 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .login-button:hover:not(:disabled) {
      background: var(--primary-dark);
      box-shadow: 0 16px 28px rgba(22, 93, 255, 0.28);
      transform: translateY(-1px);
    }

    .login-button:disabled {
      cursor: not-allowed;
      opacity: 0.72;
      transform: none;
    }

    .footer {
      color: #d5dbe3;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    @media (max-width: 1024px) {
      .page {
        padding: 22px 22px 18px;
      }

      .shell {
        gap: 32px;
      }

      .feature-row {
        grid-template-columns: 1fr;
        gap: 16px;
      }

    }

    @media (max-width: 860px) {
      .shell {
        justify-content: center;
        padding-top: 54px;
        transform: translateY(-28px);
      }

      .hero {
        display: none;
      }

      .login-side {
        flex-basis: min(100%, 440px);
      }
    }

    @media (max-width: 520px) {
      .page {
        padding: 18px 14px 16px;
      }

      .brand span {
        font-size: 15px;
      }

      .shell {
        padding-top: 34px;
        transform: translateY(-16px);
      }

      .login-card {
        padding: 30px 20px 26px;
        border-radius: 20px;
      }

      .captcha-row {
        grid-template-columns: 1fr;
      }

      .captcha-note {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="brand" aria-label="Squid管理系统">
      <div class="brand-mark">S</div>
      <span>Squid管理系统</span>
    </div>

    <section class="shell">
      <div class="hero" aria-hidden="true">
        <h1>Squid管理系统</h1>
        <p class="hero-subtitle">安全、稳定、高效的代理服务管理</p>

        <div class="feature-row">
          <div class="feature">
            <span class="feature-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
              </svg>
            </span>
            <div>
              <h2>安全可靠</h2>
              <p>多重防护保障数据安全</p>
            </div>
          </div>
          <div class="feature">
            <span class="feature-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="18" cy="5" r="3"></circle>
                <circle cx="6" cy="12" r="3"></circle>
                <circle cx="18" cy="19" r="3"></circle>
                <path d="M8.6 13.5l6.8 4"></path>
                <path d="M15.4 6.5l-6.8 4"></path>
              </svg>
            </span>
            <div>
              <h2>稳定高效</h2>
              <p>智能调度保障服务稳定</p>
            </div>
          </div>
          <div class="feature">
            <span class="feature-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 3v18h18"></path>
                <path d="M7 15l4-4 3 3 5-7"></path>
              </svg>
            </span>
            <div>
              <h2>便捷管理</h2>
              <p>可视化管理轻松运维</p>
            </div>
          </div>
        </div>
      </div>

      <div class="login-side">
        <section class="login-card" aria-labelledby="loginTitle">
          <div class="card-badge" aria-hidden="true">
            <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
              <path d="M9 12l2 2 4-5"></path>
            </svg>
          </div>

          <h2 id="loginTitle">欢迎登录</h2>
          <p class="hint"></p>

          <form id="loginForm" class="form" autocomplete="on">
            <div class="error-message" id="errorMessage" role="alert"></div>

            <label class="field" for="username">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              <input id="username" name="username" type="text" placeholder="请输入账号" autocomplete="username" aria-label="账号" required>
            </label>

            <div class="field password-field">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
              <input id="password" name="password" type="password" placeholder="请输入密码" autocomplete="current-password" aria-label="密码" required>
              <button class="password-toggle" id="togglePassword" type="button" aria-label="显示密码" aria-pressed="false">
                <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>

            <div class="captcha-row" aria-label="验证码校验">
              <label class="field" for="captcha">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                  <path d="M9 12l2 2 4-5"></path>
                </svg>
                <input id="captcha" name="captcha" type="text" placeholder="请输入验证码" autocomplete="off" aria-describedby="captchaNote" maxlength="4" required>
              </label>
              <div class="captcha-panel">
                <button class="captcha-image-button" id="refreshCaptcha" type="button" aria-label="刷新验证码" title="点击刷新验证码">
                  <img class="captcha-image" id="captchaImage" alt="验证码" width="132" height="44">
                </button>
                <div class="captcha-note" id="captchaNote">点击图片刷新</div>
              </div>
            </div>

            <label class="remember-row" for="rememberPassword">
              <input id="rememberPassword" name="rememberPassword" type="checkbox">
              <span>记住密码</span>
            </label>

            <button class="login-button" id="loginButton" type="submit">登录</button>
          </form>
        </section>
      </div>
    </section>

    <footer class="footer">© 2026-2026 Squid管理系统：让代理服务管理更简单更安全</footer>
  </main>

  <script>
    const REMEMBER_CREDENTIALS_KEY = 'squidManagerRememberedCredentials';
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const rememberPasswordInput = document.getElementById('rememberPassword');
    const togglePasswordButton = document.getElementById('togglePassword');
    const eyeIcon = document.getElementById('eyeIcon');
    const loginButton = document.getElementById('loginButton');
    const errorMessage = document.getElementById('errorMessage');
    const captchaInput = document.getElementById('captcha');
    const captchaImage = document.getElementById('captchaImage');
    const refreshCaptchaButton = document.getElementById('refreshCaptcha');

    function setError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.add('show');
    }

    function clearError() {
      errorMessage.textContent = '';
      errorMessage.classList.remove('show');
    }

    function setPasswordVisible(visible) {
      passwordInput.type = visible ? 'text' : 'password';
      togglePasswordButton.classList.toggle('active', visible);
      togglePasswordButton.setAttribute('aria-pressed', String(visible));
      togglePasswordButton.setAttribute('aria-label', visible ? '隐藏密码' : '显示密码');
      eyeIcon.innerHTML = visible
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
    }

    function refreshCaptcha() {
      captchaImage.src = `/api/auth/captcha?t=${Date.now()}`;
      captchaInput.value = '';
    }

    function loadRememberedCredentials() {
      try {
        const saved = JSON.parse(localStorage.getItem(REMEMBER_CREDENTIALS_KEY) || 'null');
        if (!saved || typeof saved.username !== 'string' || typeof saved.password !== 'string') {
          return;
        }

        usernameInput.value = saved.username;
        passwordInput.value = saved.password;
        rememberPasswordInput.checked = true;
      } catch (_) {
        try {
          localStorage.removeItem(REMEMBER_CREDENTIALS_KEY);
        } catch (_) {}
      }
    }

    function saveRememberedCredentials(username, password) {
      try {
        if (!rememberPasswordInput.checked) {
          localStorage.removeItem(REMEMBER_CREDENTIALS_KEY);
          return;
        }

        localStorage.setItem(REMEMBER_CREDENTIALS_KEY, JSON.stringify({ username, password }));
      } catch (_) {
        // 本地存储不可用时不影响登录成功后的跳转。
      }
    }

    togglePasswordButton.addEventListener('click', () => {
      setPasswordVisible(passwordInput.type === 'password');
    });

    refreshCaptchaButton.addEventListener('click', () => {
      refreshCaptcha();
      captchaInput.focus();
    });

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearError();

      loginButton.disabled = true;
      loginButton.textContent = '登录中...';

      try {
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        const formData = new FormData();
        formData.append('username', username);
        formData.append('password', password);
        formData.append('captcha', captchaInput.value.trim());

        const response = await fetch('/api/auth/login', {
          method: 'POST',
          body: formData,
        });

        if (response.ok) {
          saveRememberedCredentials(username, password);
          window.location.href = '/accounts';
          return;
        }

        if (response.status === 400) {
          setError('验证码错误或已过期，请重新输入');
        } else {
          setError(response.status === 401 ? '账号或密码错误' : '登录失败，请稍后重试');
        }
        refreshCaptcha();
      } catch (_) {
        setError('网络异常，请稍后重试');
        refreshCaptcha();
      } finally {
        loginButton.disabled = false;
        loginButton.textContent = '登录';
      }
    });

    loadRememberedCredentials();
    refreshCaptcha();
  </script>
</body>
</html>
